server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use relative redirects so they work behind a reverse proxy with a path prefix.
    absolute_redirect off;

    # Static assets (checked first due to regex priority).
    location ~* \.(?:ico|gif|jpe?g|png|svg|webp|woff2?|ttf|eot|otf|js|css|map|json)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # /share/:id → serve index.html; the Svelte app reads the path directly.
    # Inject <base href="../"> so relative asset paths (like ./_app/...)
    # resolve one level up from /share/, back to the app root.
    location ~ ^/share/ {
        sub_filter '<head>' '<head><base href="../">';
        sub_filter_once on;
        sub_filter_types text/html;
        try_files /index.html =404;
    }

    # Single path segment without dots (KG names like /wikidata+gptkb+freebase)
    # → serve index.html; the Svelte app reads KG names from the path.
    # Inject a meta tag so the app knows this is a KG path (not the mount point).
    location ~ ^/[^/.]+/?$ {
        sub_filter '</head>' '<meta name="grasp-kg-path" content="true"></head>';
        sub_filter_once on;
        sub_filter_types text/html;
        try_files /index.html =404;
    }

    # Root and static files.
    location / {
        try_files $uri $uri/ =404;
    }
}

type: env(TYPE:both)

knowledge_graph:
  kg: env(KG:wikidata)
  endpoint: env(ENDPOINT:null)

model: env(MODEL:Qwen/Qwen2.5-7B-Instruct)
overwrite_chat_template: env(OVERWRITE_CHAT_TEMPLATE:false)

train_files:
  - env(TRAIN_FILE)

val: env(VAL)

materialized: env(MATERIALIZED:false)

num_workers: env(NUM_WORKERS:4)
do_compile: env(DO_COMPILE:false)

max_length: env(MAX_LENGTH:8192)
mask_inputs: env(MASK_INPUTS:true)
batch_size: env(BATCH_SIZE:8)
gradient_accumulation_steps: env(GRADIENT_ACCUMULATION_STEPS:1)
gradient_checkpointing: env(GRADIENT_CHECKPOINTING:false)
num_epochs: env(NUM_EPOCHS:1)

skeleton_p: env(SKELETON_P:0.2)
selection_p: env(SELECTION_P:0.2)

lr: env(LR:1e-4)

lora:
  r: env(LORA_R:32)
  alpha: env(LORA_ALPHA:32)
  dropout: env(LORA_DROPOUT:0.05)
  target_modules: env(LORA_TARGET_MODULES:all-linear)
  save_modules: env(LORA_SAVE_MODULES:null)
